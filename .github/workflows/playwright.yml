name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run: all, api, db, ui, or comma-separated combinations like api,db'
        required: false
        default: 'all'
        type: string
      tag:
        description: 'Optional Playwright tag filter, for example @smoke'
        required: false
        default: ''
        type: string
      workers:
        description: 'Number of Playwright workers'
        required: false
        default: '3'
        type: string
      retries:
        description: 'Number of Playwright retries'
        required: false
        default: '1'
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      SUPABASE_URL: ${{ secrets['SUPABASE_URL'] }}
      SUPABASE_API_KEY: ${{ secrets['SUPABASE_API_KEY'] }}
      DB_URL: ${{ secrets['DB_URL'] }}
      BASE_URL: ${{ secrets['BASE_URL'] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run Playwright tests
        env:
          INPUT_TEST_TYPE: ${{ github.event.inputs.test_type || 'all' }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          INPUT_WORKERS: ${{ github.event.inputs.workers || '3' }}
          INPUT_RETRIES: ${{ github.event.inputs.retries || '1' }}
        run: |
          set -euo pipefail

          export TEST_TYPE="${INPUT_TEST_TYPE}"
          export TAG="${INPUT_TAG}"
          export PW_WORKERS="${INPUT_WORKERS}"
          export PW_RETRIES="${INPUT_RETRIES}"

          echo "Selected test type: ${TEST_TYPE}"
          echo "Selected tag: ${TAG:-<none>}"
          echo "Selected workers: ${PW_WORKERS}"
          echo "Selected retries: ${PW_RETRIES}"
          echo "Resolved BASE_URL: ${BASE_URL:-<not set>}"

          test_paths=()
          normalized_test_type="$(echo "${TEST_TYPE}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [[ "${normalized_test_type}" == "all" || -z "${normalized_test_type}" ]]; then
            echo "Running all Playwright tests"
          else
            IFS=',' read -ra selected_types <<< "${normalized_test_type}"
            for selected_type in "${selected_types[@]}"; do
              case "${selected_type}" in
                api)
                  test_paths+=("tests/api")
                  ;;
                db)
                  test_paths+=("tests/db")
                  ;;
                ui)
                  test_paths+=("tests/ui")
                  ;;
                *)
                  echo "Unsupported test_type value: ${selected_type}"
                  echo "Supported values are: all, api, db, ui, or comma-separated combinations like api,db."
                  exit 1
                  ;;
              esac
            done
          fi

          command=(npx playwright test)

          if [[ ${#test_paths[@]} -gt 0 ]]; then
            command+=("${test_paths[@]}")
          fi

          if [[ -n "${TAG}" ]]; then
            command+=(--grep "${TAG}")
          fi

          command+=(--workers="${PW_WORKERS}")
          command+=(--retries="${PW_RETRIES}")

          echo "Final command: ${command[*]}"
          "${command[@]}"

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Playwright Tests
          path: results.xml
          reporter: java-junit
          fail-on-error: false
          max-annotations: 50

      - name: Generate Test Summary
        if: always()
        run: |
          PASSED=$(jq '.stats.expected' results.json)
          FAILED=$(jq '.stats.unexpected' results.json)

          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 30
